version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eaglepoint-app
    restart: unless-stopped
    working_dir: /var/www
    environment:
      # Ensure CLI/entrypoint use the compose DB (overrides a host-only .env)
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-eaglepoint}
      DB_USERNAME: ${DB_USERNAME:-eaglepoint}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      # Set to 0 to skip migrate on boot (composer install still runs)
      AUTORUN_MIGRATIONS: ${AUTORUN_MIGRATIONS:-1}
      # Runs php artisan db:seed once when roles table is empty (safe on restarts)
      AUTORUN_SEED: ${AUTORUN_SEED:-1}
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    networks:
      - eaglepoint
    depends_on:
      mysql:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eaglepoint-worker
    restart: unless-stopped
    working_dir: /var/www
    entrypoint: []
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-eaglepoint}
      DB_USERNAME: ${DB_USERNAME:-eaglepoint}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    networks:
      - eaglepoint
    depends_on:
      app:
        condition: service_started
      mysql:
        condition: service_healthy

  webserver:
    image: nginx:alpine
    container_name: eaglepoint-webserver
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - eaglepoint
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: eaglepoint-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-eaglepoint}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-eaglepoint}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - eaglepoint
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  eaglepoint:
    driver: bridge

volumes:
  mysql_data:
    driver: local
